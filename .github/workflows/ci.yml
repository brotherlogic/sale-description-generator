name: Continuous Integration

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24' # Using latest stable Go

      - name: Install dependencies
        run: go mod download

      - name: Run Tests
        run: go test -v ./...
